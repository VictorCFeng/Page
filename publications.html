<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Publications · Cheng Feng</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  .wrap { max-width: 920px; margin: 0 auto; padding: 0 56px; }

  .page-head { padding: 32px 0 20px; border-bottom: 1px solid var(--rule); display: grid; grid-template-columns: 1fr auto; gap: 28px; align-items: end; }
  .page-head h1 { font-size: var(--fs-display); margin: 0; letter-spacing: -0.02em; font-weight: 500; line-height: var(--lh-tight); }
  .page-head .count { font-family: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: .06em; padding-bottom: 6px; }
  .page-head .eyebrow { margin-bottom: 10px; }

  .group { margin-top: 36px; scroll-margin-top: 20px; }
  .group-head { display: grid; grid-template-columns: 64px 1fr; gap: 22px; align-items: baseline; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--ink); }
  .group-head .n { font-family: var(--serif); font-style: italic; font-size: 30px; color: var(--accent); line-height: 1; }
  .group-head h2 { font-size: 20px; margin: 0; font-weight: 500; letter-spacing: -0.008em; }
  .group-head h2 .sub { display: block; font-size: 12.5px; font-style: italic; color: var(--ink-3); font-weight: 400; margin-top: 1px; }

  .pub {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 20px;
    padding: 12px 0;
    border-top: 1px solid var(--rule);
    align-items: start;
  }
  .pub:last-child { border-bottom: 1px solid var(--rule); }
  .pub .year { font-family: var(--mono); font-size: 12px; color: var(--ink-3); letter-spacing: .04em; padding-top: 2px; }
  .pub .title { font-size: 14.5px; font-weight: 500; line-height: 1.36; color: var(--ink); }
  .pub .authors { font-size: 13px; color: var(--ink-2); margin-top: 2px; line-height: 1.45; }
  .pub .authors b { color: var(--ink); font-weight: 600; }
  .pub .venue { font-style: italic; color: var(--ink-3); font-size: 12.5px; margin-top: 2px; }
  .pub .badges { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
  .pub .badges span { font-family: var(--sans); font-size: 10px; letter-spacing: .04em; padding: 2px 7px; border: 1px solid var(--rule); color: var(--ink-2); background: var(--paper-soft); border-radius: 999px; }
  .pub .badges span.h { background: var(--highlight); color: var(--accent); border-color: var(--accent-soft); }

  .filter { display: flex; gap: 6px; margin: 18px 0 0; flex-wrap: wrap; }
  .filter a { font-family: var(--sans); font-size: 11px; letter-spacing: .04em; padding: 4px 10px; background: var(--paper-soft); border: 1px solid var(--rule); color: var(--ink-2); border-bottom: 1px solid var(--rule); }
  .filter a:hover { background: var(--highlight); color: var(--accent); border-color: var(--accent-soft); }
</style>
</head>
<body data-screen-label="Publications">
  <div id="nav"></div>
  <div class="wrap">
      <header class="page-head">
        <div>
          <div class="eyebrow">Publications</div>
          <h1>Selected work.</h1>
          <nav class="filter">
            <a href="#g0">Working Papers</a>
            <a href="#g2">01 · Data Centers &amp; Inverters</a>
            <a href="#g3">02 · AI for Energy</a>
            <a href="#g1">03 · DER Flexibility, Coordination &amp; Communication</a>
          </nav>
        </div>
        <div class="count" id="count"></div>
      </header>

    <div id="groups"></div>

    <div id="foot"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="site-data.jsx?v=20260514"></script>
  <script type="text/babel" src="publications-app.jsx?v=20260514"></script>
</body>
</html>
